name: flutter_tts
description: A flutter plugin for Text to Speech.  This plugin is supported on iOS, macOS, Android, Web, & Windows.
version: 5.0.0
homepage: https://github.com/linga-io/flutter_tts
repository: https://github.com/linga-io/flutter_tts

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.eyedeadevelopment.fluttertts
        pluginClass: FlutterTtsPlugin
      ios:
        pluginClass: FlutterTtsPlugin
      macos:
        pluginClass: FlutterTtsPlugin
      windows:
        pluginClass: FlutterTtsPlugin
        supportedVariants:
          - win32
      web:
        pluginClass: FlutterTtsPlugin
        fileName: flutter_tts_web.dart

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"
dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^4.0.0
